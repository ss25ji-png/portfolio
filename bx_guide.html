<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BX GUIDE</title>
     <!-- 파비콘 -->
    <link rel="shortcut icon" href="./img/favicon-96x96.png" type="image/x-icon">
    <!-- 외부 css 연결 -->
    <link rel="stylesheet" href="./css/guide_style.css">
</head>

<body>
    <div class="wrap">
        <img src="./img/BX/pf9.png" alt="pf">
        <img src="./img/BX/pf10.png" alt="pf">
        <img src="./img/BX/pf11.png" alt="pf">
        <img src="./img/BX/pf12.png" alt="pf">
        <img src="./img/BX/pf13.png" alt="pf">
        <img src="./img/BX/pf14.png" alt="pf">
        <img src="./img/BX/pf15.png" alt="pf">
        <img src="./img/BX/pf16.png" alt="pf">
        <img src="./img/BX/pf17.png" alt="pf">
        <img src="./img/BX/pf18.png" alt="pf">
    </div>



    <!-- 스크롤 업 버튼 -->
    <button id="scroll_up_btn">
        <img src="./img/upicon.png" alt="업">
    </button>
    <!-- 심플 백 버튼 -->
    <button id="scroll_back_btn">
        <img src="./img/bicon.png" alt="빽">
    </button>




    <script src="./js/jquery-4.0.0.min.js"></script>
    <script>
        const upBtn = document.getElementById("scroll_up_btn");
        const backBtn = document.getElementById("scroll_back_btn");
        upBtn.addEventListener("click", function () {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
        backBtn.addEventListener("click", function () {
            window.close();
        });
    </script>



</body>

</html>
