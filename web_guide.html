    <!-- 외부 css 연결 -->
     <link rel="stylesheet" href="./css/guide_style.css">
</head>
<body>
      <div class="wrap">
        <img src="./img/WEB GUIDE/pf19.png" alt="pf">
        <img src="./img/WEB GUIDE/pf20.png" alt="pf">
        <img src="./img/WEB GUIDE/pf21.png" alt="pf">
        <img src="./img/WEB GUIDE/pf22.png" alt="pf">
        <img src="./img/WEB GUIDE/pf23.png" alt="pf">
        <img src="./img/WEB GUIDE/pf24.png" alt="pf">
        <img src="./img/WEB GUIDE/pf25.png" alt="pf">
        <img src="./img/WEB GUIDE/pf26.png" alt="pf">
        <img src="./img/WEB GUIDE/pf27.png" alt="pf">
        <img src="./img/WEB GUIDE/pf28.png" alt="pf">
        <img src="./img/WEB GUIDE/pf29.png" alt="pf">
        <img src="./img/WEB GUIDE/pf30.png" alt="pf">
        <img src="./img/WEB GUIDE/pf31.png" alt="pf">
        <img src="./img/WEB GUIDE/pf32.png" alt="pf">

    <!-- 스크롤 업 버튼 -->
    <button id="scroll_up_btn">
        <img src="./img/upicon.png" alt="업">
    </button>
    <!-- 심플 백 버튼 -->
    <button id="scroll_back_btn">
        <img src="./img/bicon.png" alt="빽">
    </button>




    <script src="./js/jquery-4.0.0.min.js"></script>
    <script>
        const upBtn = document.getElementById("scroll_up_btn");
        const backBtn = document.getElementById("scroll_back_btn");

        upBtn.addEventListener("click", function () {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
        backBtn.addEventListener("click", function () {
            window.close();
        });
    </script>


    
</body>
</html>
